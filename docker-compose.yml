services:
  postgres:
    image: postgres:16-alpine
    container_name: mindspark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindspark
      POSTGRES_USER: mindspark
      POSTGRES_PASSWORD: mindspark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindspark -d mindspark"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
